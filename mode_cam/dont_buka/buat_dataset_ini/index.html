<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        
        .video-container {
            position: relative;
            width: 480px;
            max-width: 100%;
            margin: 0 auto;
        }
        #video {
            display: block;
            width: 100%;
            transform: scaleX(-1);
            border-radius: 8px;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom: 15px;">Buat Dataset</h2>
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls">
            <button id="button-on">▶️ Start Webcam</button>
            <button id="button-off">⏹️ Stop Webcam</button>
        </div>

        <p id="status"></p>
        <h3 style="margin-top: 20px;">Dataset Info</h3>
        <div class="sample-count" id="sampleCount">0</div>
        <div id="labelList" style="margin: 10px 0;"><em>Belum ada data</em></div>

        <div class="dataset-controls">
            <input type="text" id="labelInput" placeholder="Nama gesture (misal: peace, fist)">
            <button id="btnCapture">Capture (atau tekan Space)</button>
            <button id="btnExport">Export JSON</button>
            <button id="btnClear">Clear All</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="js/webcam.js"></script>
    <script src="js/handDetector.js"></script>
    <script src="js/dataset.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
