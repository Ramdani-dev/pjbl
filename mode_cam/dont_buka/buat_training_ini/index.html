<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Builder - Hand Gesture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        
        #video {
            display: block;
            width: 640px;
            max-width: 100%;
            transform: scaleX(-1);
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #trainingLog {
            background: #0a0a15;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Training Model</h1>

        <div id="status">Import dataset untuk mulai training</div>

        <div class="card">
            <h3>1. Import Dataset</h3>
            <input type="file" id="importFile" accept=".json">
            <div id="datasetInfo" style="margin-top: 10px;"></div>
        </div>

        <div class="card">
            <h3>2. Training Settings</h3>
            <label>Epochs:</label>
            <input type="number" id="epochs" value="50" min="10" max="200">
            <label>Batch Size:</label>
            <input type="number" id="batchSize" value="16" min="4" max="64">

            <button id="btnTrain" class="btn-train" disabled style="margin-top: 20px;">🚀 Start Training</button>
        </div>

        <div class="card">
            <h3>3. Progress</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progress">0%</div>
            </div>
            <div id="trainingLog">Belum ada training...</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="js/dataset.js"></script>
    <script src="js/model.js"></script>
    <script src="js/training.js"></script>
</body>
</html>
