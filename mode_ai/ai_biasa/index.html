<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <base href="/mode_ai/ai_biasa/">
    <title>Mode Biasa AI - SUIT GAME SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            colors: {
              primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a5f' },
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-slate-800 font-sans w-screen h-screen overflow-hidden antialiased">

    <!-- Subtle Background -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-50 via-white to-sky-50"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-200/25 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-sky-200/20 rounded-full blur-[120px]"></div>
    </div>

    <!-- Orientation Lock -->
    <div id="lock-screen" class="hidden fixed inset-0 z-[9999] bg-white/95 backdrop-blur-xl flex-col items-center justify-center gap-6 p-8 text-center">
        <div class="w-20 h-20 animate-rotate-phone">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="w-full h-full stroke-primary-600 fill-none stroke-[1.5]">
                <rect x="30" y="10" width="40" height="70" rx="6" ry="6" stroke-width="2.5"/>
                <circle cx="50" cy="72" r="3"/>
                <line x1="42" y1="16" x2="58" y2="16" stroke-width="2" stroke-linecap="round"/>
                <path d="M 78 50 A 30 30 0 0 1 50 80" stroke-width="2" fill="none" stroke-linecap="round"/>
                <polygon points="50,75 50,85 42,80" fill="currentColor" stroke="none"/>
                <path d="M 22 40 A 30 30 0 0 1 50 10" stroke-width="2" fill="none" stroke-linecap="round"/>
                <polygon points="50,5 50,15 58,10" fill="currentColor" stroke="none"/>
            </svg>
        </div>
        <h2 class="font-bold text-base text-slate-800 max-w-xs">Silakan Miringkan Handphone Anda</h2>
        <p class="text-sm text-slate-500 max-w-xs">Game ini memerlukan tampilan landscape.</p>
    </div>

    <!-- ===== GAME ARENA ===== -->
    <div id="screen-normal" class="screen screen-active" style="opacity:1;pointer-events:all;">
        <div class="w-full h-full grid grid-rows-[auto_1fr_auto] z-10">

            <!-- Header -->
            <div class="flex items-center justify-between px-6 sm:px-10 py-4 bg-white/70 backdrop-blur-md border-b border-gray-200/60">
                <div class="flex items-center gap-2">
                    <div class="font-bold text-sm sm:text-base text-primary-700 tracking-wide">Mode Biasa</div>
                    <span class="px-2 py-0.5 bg-gradient-to-r from-blue-500 to-sky-500 rounded-full text-[0.6rem] text-white font-bold tracking-wider">🤖 AI</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-center">
                        <span class="font-extrabold text-2xl text-slate-800" id="score-player">0</span>
                        <span class="text-[0.65rem] text-slate-500 block font-medium">KAMU</span>
                    </div>
                    <span class="text-xs font-bold text-primary-400">VS</span>
                    <div class="text-center">
                        <span class="font-extrabold text-2xl text-slate-800" id="score-system">0</span>
                        <span class="text-[0.65rem] text-slate-500 block font-medium">SISTEM</span>
                    </div>
                </div>
            </div>

            <!-- Game Area -->
            <div class="game-arena grid grid-cols-1 lg:grid-cols-[1fr_auto_1fr] items-center gap-6 sm:gap-10 p-6 sm:p-10 min-h-0 overflow-auto">

                <!-- Choice Cards -->
                <div class="flex flex-row lg:flex-col gap-3 items-center justify-center flex-wrap">
                    <!-- Rock -->
                    <div class="choice-card group flex items-center gap-3 w-full max-w-[220px] p-4 bg-white/80 backdrop-blur-sm border-2 border-dashed border-blue-200 rounded-2xl cursor-pointer shadow-sm hover:shadow-lg hover:shadow-blue-500/10 hover:border-primary-400 hover:border-solid hover:-translate-y-0.5 transition-all duration-300" data-choice="rock" id="choose-rock">
                        <div class="w-11 h-11 flex items-center justify-center text-2xl bg-primary-50 rounded-xl shrink-0">✊</div>
                        <div>
                            <div class="font-bold text-sm text-slate-800">Batu</div>
                            <div class="text-xs text-slate-400 mt-0.5">Rock</div>
                        </div>
                    </div>
                    <!-- Scissors -->
                    <div class="choice-card group flex items-center gap-3 w-full max-w-[220px] p-4 bg-white/80 backdrop-blur-sm border-2 border-dashed border-blue-200 rounded-2xl cursor-pointer shadow-sm hover:shadow-lg hover:shadow-blue-500/10 hover:border-primary-400 hover:border-solid hover:-translate-y-0.5 transition-all duration-300" data-choice="scissors" id="choose-scissors">
                        <div class="w-11 h-11 flex items-center justify-center text-2xl bg-amber-50 rounded-xl shrink-0">✌️</div>
                        <div>
                            <div class="font-bold text-sm text-slate-800">Gunting</div>
                            <div class="text-xs text-slate-400 mt-0.5">Scissors</div>
                        </div>
                    </div>
                    <!-- Paper -->
                    <div class="choice-card group flex items-center gap-3 w-full max-w-[220px] p-4 bg-white/80 backdrop-blur-sm border-2 border-dashed border-blue-200 rounded-2xl cursor-pointer shadow-sm hover:shadow-lg hover:shadow-blue-500/10 hover:border-primary-400 hover:border-solid hover:-translate-y-0.5 transition-all duration-300" data-choice="paper" id="choose-paper">
                        <div class="w-11 h-11 flex items-center justify-center text-2xl bg-emerald-50 rounded-xl shrink-0">✋</div>
                        <div>
                            <div class="font-bold text-sm text-slate-800">Kertas</div>
                            <div class="text-xs text-slate-400 mt-0.5">Paper</div>
                        </div>
                    </div>
                </div>

                <!-- VS Center -->
                <div class="flex flex-col items-center justify-center gap-4">
                    <div>
                        <div class="display-box w-20 h-20 flex items-center justify-center rounded-2xl border-2 border-dashed border-blue-200 bg-white/80 backdrop-blur-sm text-4xl shadow-sm transition-all duration-500" id="display-player">—</div>
                        <div class="text-xs text-slate-400 font-medium text-center mt-2">KAMU</div>
                    </div>

                    <div class="font-extrabold text-xl text-primary-400 tracking-widest relative px-8">
                        VS
                        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-5 h-px bg-gradient-to-r from-transparent to-primary-300"></div>
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-5 h-px bg-gradient-to-l from-transparent to-primary-300"></div>
                    </div>

                    <div>
                        <div class="display-box w-20 h-20 flex items-center justify-center rounded-2xl border-2 border-dashed border-blue-200 bg-white/80 backdrop-blur-sm text-4xl shadow-sm transition-all duration-500" id="display-opponent">❓</div>
                        <div class="text-xs text-slate-400 font-medium text-center mt-2">SISTEM</div>
                    </div>

                    <div class="text-center min-h-[2rem] flex items-center">
                        <div class="result-text font-extrabold text-base tracking-wide" id="final-result"></div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="flex flex-col items-center justify-center gap-3">
                    <div class="bg-white/80 backdrop-blur-sm border-2 border-dashed border-blue-200 rounded-2xl p-5 shadow-sm space-y-3">
                        <div class="text-xs text-slate-500 font-medium">Menang <span id="stat-win" class="inline-block ml-2 font-bold text-emerald-500 text-sm">0</span></div>
                        <div class="text-xs text-slate-500 font-medium">Kalah <span id="stat-lose" class="inline-block ml-2 font-bold text-rose-500 text-sm">0</span></div>
                        <div class="text-xs text-slate-500 font-medium">Seri <span id="stat-draw" class="inline-block ml-2 font-bold text-primary-500 text-sm">0</span></div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="flex items-center justify-center px-6 py-3 bg-white/70 backdrop-blur-md border-t border-gray-200/60">
                <button class="px-6 py-2.5 bg-white/80 backdrop-blur-sm border border-gray-200 text-slate-600 font-medium text-sm rounded-xl hover:bg-primary-50 hover:border-primary-200 hover:text-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500/30 transition-all duration-200 flex items-center gap-2" id="back-menu">
                    <svg viewBox="0 0 24 24" class="w-4 h-4 stroke-current fill-none stroke-2"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Kembali
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="js/lstm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
